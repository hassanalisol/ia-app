<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#071a0e">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="IA Companion">
<title>IA Companion — اثنا عشري</title>
<link rel="manifest" id="pwa-manifest">
<meta name="mobile-web-app-capable" content="yes">
<meta name="application-name" content="IA Companion">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Scheherazade+New:wght@400;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg-deep:    #071a0e;
    --bg-mid:     #0d2416;
    --bg-card:    #102d1a;
    --bg-card2:   #163d22;
    --gold:       #c9a84c;
    --gold-light: #e8c87a;
    --gold-dim:   #7a6030;
    --teal:       #1a5c3a;
    --teal-light: #3db87a;
    --red-dark:   #8b1a1a;
    --red:        #c0392b;
    --green:      #1a6b3a;
    --green-light:#27ae60;
    --text-main:  #f0ead0;
    --text-muted: #7a9e82;
    --text-dim:   #3a5e42;
    --border:     rgba(201,168,76,0.15);
    --border-bright: rgba(201,168,76,0.4);
    --arabic:     'Scheherazade New', serif;
    --ui:         'Inter', sans-serif;
    --r:          14px;
    --r-lg:       20px;
  }
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html, body { height:100%; overflow:hidden; background:var(--bg-deep); }
  body { font-family:var(--ui); color:var(--text-main); display:flex; flex-direction:column; }

  /* ── HEADER ── */
  #header {
    background:var(--bg-deep);
    border-bottom:1px solid var(--border);
    padding:14px 18px 10px;
    flex-shrink:0;
    position:relative;
  }
  #header-top { display:flex; align-items:center; justify-content:space-between; }
  #app-title { font-family:var(--arabic); font-size:22px; color:var(--gold); letter-spacing:0.5px; }
  #app-subtitle { font-size:10px; color:var(--text-muted); letter-spacing:2px; text-transform:uppercase; margin-top:1px; }
  #hijri-banner {
    margin-top:10px;
    text-align:center;
    padding:10px 0 4px;
    border-top:1px solid var(--border);
  }
  #hijri-date-main {
    font-family:var(--arabic);
    font-size:28px;
    color:var(--gold-light);
    line-height:1.2;
  }
  #hijri-date-sub { font-size:11px; color:var(--text-muted); margin-top:2px; letter-spacing:1px; }
  #today-significance {
    margin-top:6px;
    font-size:12px;
    color:var(--teal-light);
    min-height:16px;
    font-style:italic;
    text-align:center;
  }
  #azaan-btn {
    background: rgba(201,168,76,0.15);
    border:1px solid var(--border-bright);
    border-radius:10px;
    padding: 8px 14px;
    color:var(--gold);
    font-size:13px;
    cursor:pointer;
    display:flex; align-items:center; gap:6px;
    transition:background 0.2s;
    letter-spacing:0.5px;
  }
  #azaan-btn:active { background:rgba(201,168,76,0.25); }
  #azaan-btn.playing { border-color:var(--teal-light); color:var(--teal-light); background:rgba(61,184,122,0.15); animation:pulse 1.5s infinite; }
  @keyframes pulse { 0%,100%{box-shadow:0 0 0 0 rgba(61,184,158,0.4)} 50%{box-shadow:0 0 0 8px rgba(61,184,158,0)} }

  /* ── TABS ── */
  #tabs {
    display:flex; background:var(--bg-mid);
    border-bottom:1px solid var(--border);
    flex-shrink:0;
  }
  .tab {
    flex:1; padding:10px 4px 8px; text-align:center;
    font-size:10px; letter-spacing:1px; text-transform:uppercase;
    color:var(--text-dim); cursor:pointer; border:none;
    background:none; transition:color 0.2s;
    border-bottom:2px solid transparent;
  }
  .tab .ti { font-size:18px; display:block; margin-bottom:2px; }
  .tab.active { color:var(--gold); border-bottom-color:var(--gold); }

  /* ── CONTENT ── */
  #content { flex:1; overflow-y:auto; overflow-x:hidden; -webkit-overflow-scrolling:touch; }
  .screen { display:none; padding:16px; }
  .screen.active { display:block; }

  /* ── PRAYER TIMES ── */
  #next-prayer-card {
    background: linear-gradient(135deg, var(--bg-card) 0%, var(--bg-card2) 100%);
    border:1px solid var(--border-bright);
    border-radius:var(--r-lg);
    padding:20px;
    text-align:center;
    margin-bottom:16px;
    position:relative;
    overflow:hidden;
  }
  #next-prayer-card::before {
    content:''; position:absolute; top:-40px; right:-40px;
    width:120px; height:120px; border-radius:50%;
    background:rgba(201,168,76,0.05);
  }
  #next-prayer-label { font-size:11px; color:var(--text-muted); letter-spacing:2px; text-transform:uppercase; }
  #next-prayer-name { font-family:var(--arabic); font-size:32px; color:var(--gold-light); margin:4px 0; }
  #next-prayer-time { font-size:42px; font-weight:300; color:var(--text-main); letter-spacing:-1px; }
  #next-prayer-countdown { font-size:13px; color:var(--teal-light); margin-top:6px; }
  .prayer-list { display:flex; flex-direction:column; gap:8px; }
  .prayer-row {
    display:flex; align-items:center; justify-content:space-between;
    background:var(--bg-card); border:1px solid var(--border);
    border-radius:var(--r); padding:14px 16px;
    transition:border-color 0.3s;
  }
  .prayer-row.current { border-color:var(--gold); background:var(--bg-card2); }
  .prayer-row.passed { opacity:0.45; }
  .prayer-name-ar { font-family:var(--arabic); font-size:20px; color:var(--gold); }
  .prayer-name-en { font-size:11px; color:var(--text-muted); margin-top:1px; }
  .prayer-time-val { font-size:22px; font-weight:300; color:var(--text-main); }
  .prayer-adhan-icon { font-size:20px; color:var(--text-dim); cursor:pointer; padding:4px; }
  .prayer-adhan-icon:active { color:var(--gold); }

  /* ── CALENDAR ── */
  .cal-nav { display:flex; align-items:center; justify-content:space-between; margin-bottom:16px; }
  .cal-nav button { background:none; border:1px solid var(--border); color:var(--gold); border-radius:8px; padding:8px 14px; font-size:18px; cursor:pointer; }
  .cal-month-title { font-family:var(--arabic); font-size:22px; color:var(--gold-light); text-align:center; }
  .cal-month-en { font-size:11px; color:var(--text-muted); text-align:center; }
  .cal-grid { display:grid; grid-template-columns:repeat(7,1fr); gap:4px; }
  .cal-day-header { text-align:center; font-size:10px; color:var(--text-dim); padding:6px 0; letter-spacing:1px; text-transform:uppercase; }
  .cal-day {
    aspect-ratio:1; display:flex; flex-direction:column;
    align-items:center; justify-content:center;
    border-radius:10px; cursor:pointer;
    font-size:14px; color:var(--text-main);
    border:1px solid transparent;
    position:relative; transition:background 0.15s;
  }
  .cal-day:active { background:var(--bg-card2); }
  .cal-day.today { border-color:var(--gold); color:var(--gold); font-weight:600; }
  .cal-day.significant { background:rgba(201,168,76,0.08); }
  .cal-day.significant::after {
    content:''; position:absolute; bottom:3px;
    width:5px; height:5px; border-radius:50%; background:var(--gold);
  }
  .cal-day.mourning { background:rgba(139,26,26,0.15); }
  .cal-day.mourning::after { background:var(--red); }
  .cal-day.celebration { background:rgba(26,107,58,0.15); }
  .cal-day.celebration::after { background:var(--green-light); }
  .cal-day.empty { opacity:0; pointer-events:none; }
  .cal-day-num { font-size:15px; line-height:1.1; }
  .cal-day-greg { font-size:9px; color:var(--text-muted); margin-top:2px; line-height:1.2; text-align:center; }

  /* Event detail popup */
  #event-popup {
    position:fixed; bottom:0; left:0; right:0;
    background:var(--bg-card);
    border-top:1px solid var(--border-bright);
    border-radius:20px 20px 0 0;
    padding:20px 20px 34px;
    transform:translateY(100%);
    transition:transform 0.3s ease;
    z-index:100;
    max-height:50vh; overflow-y:auto;
  }
  #event-popup.open { transform:translateY(0); }
  #event-popup-title { font-family:var(--arabic); font-size:22px; color:var(--gold); margin-bottom:4px; }
  #event-popup-date { font-size:12px; color:var(--text-muted); margin-bottom:12px; }
  #event-popup-desc { font-size:14px; color:var(--text-main); line-height:1.7; }
  #popup-close { float:right; background:none; border:none; color:var(--text-muted); font-size:22px; cursor:pointer; }

  /* ── DATES SCREEN ── */
  .section-title {
    font-size:11px; letter-spacing:2px; text-transform:uppercase;
    color:var(--text-dim); margin:16px 0 10px;
    padding-bottom:6px; border-bottom:1px solid var(--border);
  }
  .event-card {
    background:var(--bg-card); border:1px solid var(--border);
    border-radius:var(--r); padding:14px 16px;
    margin-bottom:8px; display:flex; align-items:center; gap:14px;
  }
  .event-card.mourning { border-left:3px solid var(--red); }
  .event-card.celebration { border-left:3px solid var(--green-light); }
  .event-card.special { border-left:3px solid var(--gold); }
  .event-dot { width:10px; height:10px; border-radius:50%; flex-shrink:0; }
  .event-dot.mourning { background:var(--red); }
  .event-dot.celebration { background:var(--green-light); }
  .event-dot.special { background:var(--gold); }
  .event-info { flex:1; }
  .event-title-ar { font-family:var(--arabic); font-size:18px; color:var(--gold); }
  .event-title-en { font-size:13px; color:var(--text-main); margin-top:1px; }
  .event-date-badge {
    text-align:center; flex-shrink:0;
    min-width:52px;
  }
  .event-hijri { font-family:var(--arabic); font-size:16px; color:var(--gold-light); }
  .event-days-away { font-size:10px; color:var(--text-muted); margin-top:2px; }
  .event-card.upcoming .event-days-away { color:var(--teal-light); }
  .upcoming-badge {
    font-size:9px; background:rgba(61,184,158,0.15);
    color:var(--teal-light); border:1px solid var(--teal);
    border-radius:4px; padding:2px 6px; margin-left:6px;
    vertical-align:middle;
  }
  .tomorrow-badge {
    font-size:9px; background:rgba(201,168,76,0.15);
    color:var(--gold); border:1px solid var(--gold-dim);
    border-radius:4px; padding:2px 6px; margin-left:6px;
    vertical-align:middle;
  }

  /* ── ZIYARAT ── */
  .ziyarat-card {
    background:var(--bg-card); border:1px solid var(--border);
    border-radius:var(--r); margin-bottom:10px; overflow:hidden;
  }
  .ziyarat-card.post-salah { border-left:3px solid var(--gold); }
  .ziyarat-card.amaal { border-left:3px solid var(--teal-light); }
  .ziyarat-header {
    display:flex; align-items:center; justify-content:space-between;
    padding:14px 16px; cursor:pointer;
  }
  .ziyarat-header:active { background:var(--bg-card2); }
  .ziyarat-title-ar { font-family:var(--arabic); font-size:20px; color:var(--gold); }
  .ziyarat-title-sub { font-size:11px; color:var(--text-muted); margin-top:2px; }
  .ziyarat-chevron { color:var(--text-dim); font-size:18px; transition:transform 0.25s; flex-shrink:0; }
  .ziyarat-chevron.open { transform:rotate(180deg); }
  .ziyarat-body {
    display:none; padding:0 16px 18px;
    border-top:1px solid var(--border);
  }
  .ziyarat-body.open { display:block; }
  .ziyarat-text {
    font-family:var(--arabic); font-size:20px; color:var(--text-main);
    line-height:2; text-align:right; direction:rtl;
    padding-top:14px;
  }
  .ziyarat-note {
    font-size:11px; color:var(--text-muted); margin-top:10px;
    padding-top:10px; border-top:1px solid var(--border);
    font-style:italic;
  }
  #loading {
    position:fixed; inset:0; background:var(--bg-deep);
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    z-index:999;
  }
  #loading-title { font-family:var(--arabic); font-size:36px; color:var(--gold); margin-bottom:8px; }
  #loading-sub { font-size:12px; color:var(--text-muted); letter-spacing:2px; text-transform:uppercase; }
  .loader { width:40px; height:40px; border:2px solid var(--border); border-top-color:var(--gold); border-radius:50%; animation:spin 1s linear infinite; margin:24px 0 16px; }
  @keyframes spin { to { transform:rotate(360deg); } }

  /* ── ORNAMENT ── */
  .ornament { text-align:center; color:var(--gold-dim); font-family:var(--arabic); font-size:20px; margin:12px 0; letter-spacing:8px; }

  /* Tabler icons */
  @import url('https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css');

  /* scrollbar */
  #content::-webkit-scrollbar { width:3px; }
  #content::-webkit-scrollbar-track { background:transparent; }
  #content::-webkit-scrollbar-thumb { background:var(--border); border-radius:2px; }

  /* overlay */
  #overlay { position:fixed; inset:0; background:rgba(0,0,0,0.5); z-index:99; display:none; }
  #overlay.show { display:block; }

  .notif-bar {
    background:rgba(201,168,76,0.1); border:1px solid var(--border-bright);
    border-radius:10px; padding:10px 14px; margin-bottom:12px;
    font-size:12px; color:var(--gold); display:flex; align-items:center; gap:8px;
  }
</style>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css">
</head>
<body>

<div id="loading">
  <div style="font-family:'Scheherazade New',serif;font-size:48px;color:#c9a84c;">بِسْمِ ٱللَّٰهِ</div>
  <div id="loading-title">IA Companion</div>
  <div id="loading-sub">Ithna Ashari • اثنا عشري</div>
  <div class="loader"></div>
  <div style="font-size:12px;color:#4a5a7a;">Loading prayer times for Bolton, UK</div>
</div>

<div id="header">
  <div id="header-top">
    <div>
      <div id="app-title">IA Companion &nbsp;&#x2022;&nbsp; اثنا عشري</div>
      <div id="app-subtitle">Ithna Ashari • Sistani</div>
    </div>
    <button id="azaan-btn" title="Play Azaan" onclick="toggleAzaan()">
      <i class="ti ti-volume" style="font-size:16px;"></i> Azaan
    </button>
  </div>
  <div id="hijri-banner">
    <div id="hijri-date-main">Loading...</div>
    <div id="hijri-date-sub"></div>
    <div id="today-significance"></div>
  </div>
</div>

<div id="tabs">
  <button class="tab active" onclick="showTab('prayers')" id="tab-prayers">
    <i class="ti ti-clock"></i>Prayer Times
  </button>
  <button class="tab" onclick="showTab('calendar')" id="tab-calendar">
    <i class="ti ti-calendar"></i>Calendar
  </button>
  <button class="tab" onclick="showTab('dates')" id="tab-dates">
    <i class="ti ti-star"></i>Key Dates
  </button>
  <button class="tab" onclick="showTab('ziyarat')" id="tab-ziyarat">
    <i class="ti ti-book"></i>Ziyarat
  </button>
</div>

<div id="content">
  <!-- PRAYERS -->
  <div class="screen active" id="screen-prayers">
    <div id="next-prayer-card">
      <div id="next-prayer-label">Next Prayer</div>
      <div id="next-prayer-name">—</div>
      <div id="next-prayer-time">--:--</div>
      <div id="next-prayer-countdown">Loading...</div>
    </div>
    <div class="prayer-list" id="prayer-list"></div>
    <div class="ornament">✦ ✦ ✦</div>
    <div style="font-size:11px;color:var(--text-dim);text-align:center;margin-bottom:20px;">
      Sistani method • Shia Ithna Ashari<br>Bolton, UK (53.578°N 2.429°W)
    </div>
  </div>

  <!-- CALENDAR -->
  <div class="screen" id="screen-calendar">
    <div class="cal-nav">
      <button onclick="calPrev()"><i class="ti ti-chevron-left"></i></button>
      <div>
        <div class="cal-month-title" id="cal-title"></div>
        <div class="cal-month-en" id="cal-title-en"></div>
      </div>
      <button onclick="calNext()"><i class="ti ti-chevron-right"></i></button>
    </div>
    <div class="cal-grid" id="cal-grid"></div>
    <div style="margin-top:16px;display:flex;gap:12px;flex-wrap:wrap;justify-content:center;">
      <div style="display:flex;align-items:center;gap:6px;font-size:11px;color:var(--text-muted);">
        <span style="width:8px;height:8px;background:var(--red);border-radius:50%;display:inline-block;"></span>Mourning
      </div>
      <div style="display:flex;align-items:center;gap:6px;font-size:11px;color:var(--text-muted);">
        <span style="width:8px;height:8px;background:var(--green-light);border-radius:50%;display:inline-block;"></span>Celebration
      </div>
      <div style="display:flex;align-items:center;gap:6px;font-size:11px;color:var(--text-muted);">
        <span style="width:8px;height:8px;background:var(--gold);border-radius:50%;display:inline-block;"></span>Special
      </div>
    </div>
  </div>

  <!-- KEY DATES -->
  <div class="screen" id="screen-dates">
    <div id="dates-list"></div>
  </div>

  <!-- ZIYARAT & AMAAL -->
  <div class="screen" id="screen-ziyarat">
    <div id="ziyarat-list"></div>
  </div>
</div>

<!-- Event popup -->
<div id="overlay" onclick="closePopup()"></div>
<div id="event-popup">
  <button id="popup-close" onclick="closePopup()">×</button>
  <div id="event-popup-title"></div>
  <div id="event-popup-date"></div>
  <div id="event-popup-desc"></div>
</div>

<audio id="azaan-audio" preload="none" crossorigin="anonymous">
  <source src="https://www.shiasource.com/wp-content/uploads/2018/07/adhan_alhalawaji.mp3" type="audio/mpeg">
  <source src="https://cdn.aladhan.com/audio/adhans/a1.mp3" type="audio/mpeg">
</audio>

<script>
// ══════════════════════════════════════════════════
// ITHNA ASHARI KEY DATES DATABASE
// ══════════════════════════════════════════════════

  { month:1, day:7,  type:'mourning',    ar:'شهادة علي الأصغر (ع)',     en:"Shahadat of Ali Asghar (AS)",     desc:"Remembrance of Ali Asghar, the infant son of Imam Husayn (AS), martyred on the plains of Karbala." },
  { month:1, day:9,  type:'mourning',    ar:'تاسوعاء — شهادة حضرت عباس (ع)', en:"Tasu'a — Shahadat of Abbas (AS)",  desc:"The eve of Ashura. Tasu'a commemorates the Shahadat of Hazrat Abbas ibn Ali (AS), the standard-bearer of Imam Husayn." },

  // SAFAR
  { month:2, day:20, type:'mourning',    ar:'الأربعين — زيارة الأربعين',  en:"Arba'een — 40th day after Ashura", desc:"The 40th day after the martyrdom of Imam Husayn (AS). Millions perform the Arba'een walk to Karbala in the largest annual gathering on earth." },
  { month:2, day:28, type:'mourning',    ar:'وفاة النبي محمد (ص)',        en:"Wafat of Prophet Muhammad (PBUH)", desc:"The passing of the Holy Prophet Muhammad (PBUH) on 28 Safar." },
  { month:2, day:28, type:'mourning',    ar:'شهادة الإمام الحسن (ع)',     en:"Shahadat of Imam Hasan (AS)",     desc:"The martyrdom of Imam Hasan al-Mujtaba (AS), second Imam, son of Imam Ali and Sayyida Fatima." },
  { month:2, day:29, type:'mourning',    ar:'شهادة الإمام علي الرضا (ع)', en:"Shahadat of Imam Ali al-Ridha (AS)", desc:"The martyrdom of the 8th Imam, Ali ibn Musa al-Ridha (AS), in Khorasan." },

async function init() {
  try {
    await requestNotifications();
    await Promise.race([
      loadPrayerTimes(),
      new Promise((_,r) => setTimeout(() => r('timeout'), 8000))
    ]).catch(() => {
      // Use fallback times if API fails or times out
      prayerTimes = { Fajr:'03:10', Sunrise:'04:45', Dhuhr:'13:05', Asr:'17:30', Maghrib:'21:15', Isha:'22:45', Midnight:'01:05' };
    });
    await Promise.race([
      loadHijriDate(),
      new Promise((_,r) => setTimeout(() => r('timeout'), 8000))
    ]).catch(() => {
      hijriDate = { day:'—', month:{ number:12, ar:'ذو الحجة', en:"Dhul Hijja", number:12 }, year:'1447', designation:{ abbreviated:'AH' } };
      calHijriYear = 1447; calHijriMonth = 12;
      updateHijriBanner();
    });
  } catch(e) {
    console.error('Init error:', e);
  } finally {
    renderPrayers();
    renderDates();
    renderZiyarat();
    renderCalendar();
    startCountdown();
    scheduleAzaan();
    document.getElementById('loading').style.display = 'none';
  }
}

async function requestNotifications() {
  if ('Notification' in window) {
    const p = await Notification.requestPermission();
    notifGranted = (p === 'granted');
  }
}

// PRAYER TIMES API (AlAdhan — Shia Ithna Ashari)
// ══════════════════════════════════════════════════
async function loadPrayerTimes() {
  try {
    const today = new Date();
    const d = today.getDate(), m = today.getMonth()+1, y = today.getFullYear();
    const url = `https://api.aladhan.com/v1/timings/${d}-${m}-${y}?latitude=${LAT}&longitude=${LNG}&method=${METHOD}`;
    const res = await fetch(url);
    const data = await res.json();
    if (data.code === 200) {
      prayerTimes = data.data.timings;
    }
  } catch(e) {
    console.error('Prayer times load failed', e);
    // fallback approximate times
    prayerTimes = { Fajr:'04:15', Sunrise:'06:02', Dhuhr:'13:01', Asr:'16:45', Maghrib:'20:05', Isha:'21:45', Midnight:'01:01' };
  }
}

// ══════════════════════════════════════════════════
const HIJRI_MONTHS = ['Muharram','Safar','Rabi al-Awwal','Rabi al-Thani','Jumada al-Awwal','Jumada al-Thani','Rajab',"Sha'ban",'Ramadan','Shawwal',"Dhul Qa'da",'Dhul Hijja'];
const HIJRI_MONTHS_AR = ['محرّم','صفر','ربيع الأول','ربيع الثاني','جمادى الأولى','جمادى الآخرة','رجب','شعبان','رمضان','شوال','ذو القعدة','ذو الحجة'];

async function loadHijriDate() {
  try {
    const today = new Date();
    const d = today.getDate(), m = today.getMonth()+1, y = today.getFullYear();
    const url = `https://api.aladhan.com/v1/gToH/${d}-${m}-${y}`;
    const res = await fetch(url);
    const data = await res.json();
    if (data.code === 200) {
      hijriDate = data.data.hijri;
      calHijriYear = parseInt(hijriDate.year);
      calHijriMonth = parseInt(hijriDate.month.number);
    }
  } catch(e) {
    // fallback
    hijriDate = { day:'—', month:{ number:1, ar:'محرّم', en:'Muharram' }, year:'1447', designation:{ abbreviated:'AH' } };
    calHijriYear = 1447; calHijriMonth = 1;
  }
  updateHijriBanner();
}

function updateHijriBanner() {
  const dayNum = hijriDate.day || '—';
  const monthAr = hijriDate.month?.ar || '';
  const monthEn = hijriDate.month?.en || '';
  const year = hijriDate.year || '';
  document.getElementById('hijri-date-main').textContent = `${dayNum} ${monthAr} ${year}`;
  document.getElementById('hijri-date-sub').textContent = `${dayNum} ${monthEn} ${year} AH`;
  // Check today's significance
  const dayInt = parseInt(dayNum);
  const monthInt = hijriDate.month?.number || 0;
  const todayEvents = SHIA_EVENTS.filter(e => e.month === monthInt && e.day === dayInt);
  if (todayEvents.length > 0) {
    document.getElementById('today-significance').textContent = '✦ ' + todayEvents.map(e=>e.en).join(' • ') + ' ✦';
  } else {
    document.getElementById('today-significance').textContent = '';
  }
}

// ══════════════════════════════════════════════════
// RENDER PRAYERS
// ══════════════════════════════════════════════════
function renderPrayers() {
  const list = document.getElementById('prayer-list');
  list.innerHTML = '';
  const now = new Date();
  const prayers = PRAYERS.filter(p => prayerTimes[p.key]);
  prayers.forEach(p => {
    const timeStr = prayerTimes[p.key];
    const [h, min] = timeStr.split(':').map(Number);
    const pDate = new Date(); pDate.setHours(h, min, 0, 0);
    const isPast = pDate < now;
    const isCurrent = isCurrentPrayer(p.key, prayers);
    const row = document.createElement('div');
    row.className = 'prayer-row' + (isCurrent?' current':'') + (isPast&&!isCurrent?' passed':'');
    row.innerHTML = `
      <div>
        <div class="prayer-name-ar">${p.ar}</div>
        <div class="prayer-name-en">${p.en}</div>
      </div>
      <div style="display:flex;align-items:center;gap:12px;">
        <div class="prayer-time-val">${formatTime(timeStr)}</div>
        ${!p.noAdhan ? `<i class="ti ti-volume prayer-adhan-icon" onclick="playAzaan()" title="Play Azaan"></i>` : ''}
      </div>`;
    list.appendChild(row);
  });
}

function isCurrentPrayer(key, prayers) {
  const now = new Date();
  const pKeys = prayers.map(p=>p.key);
  const idx = pKeys.indexOf(key);
  if (idx < 0) return false;
  const thisTime = parseTime(prayerTimes[key]);
  const nextTime = idx+1 < prayers.length ? parseTime(prayerTimes[prayers[idx+1].key]) : null;
  if (!nextTime) return now >= thisTime;
  return now >= thisTime && now < nextTime;
}

function parseTime(str) {
  if (!str) return new Date(0);
  const [h,m] = str.split(':').map(Number);
  const d = new Date(); d.setHours(h,m,0,0); return d;
}

function formatTime(str) {
  if (!str) return '--:--';
  const [h,m] = str.split(':').map(Number);
  const ampm = h >= 12 ? 'pm' : 'am';
  const hh = h % 12 || 12;
  return `${hh}:${String(m).padStart(2,'0')} ${ampm}`;
}

// ══════════════════════════════════════════════════
// COUNTDOWN
// ══════════════════════════════════════════════════
function startCountdown() {
  updateCountdown();
  countdownInterval = setInterval(updateCountdown, 1000);
}

function updateCountdown() {
  const now = new Date();
  const prayers = PRAYERS.filter(p => prayerTimes[p.key] && !p.noAdhan);
  let next = null;
  for (const p of prayers) {
    const t = parseTime(prayerTimes[p.key]);
    if (t > now) { next = { ...p, time: t }; break; }
  }
  if (!next && prayers.length) {
    // Tomorrow's fajr
    const t = parseTime(prayerTimes[prayers[0].key]);
    t.setDate(t.getDate()+1);
    next = { ...prayers[0], time: t };
  }
  if (next) {
    const diff = next.time - now;
    const h = Math.floor(diff/3600000);
    const m = Math.floor((diff%3600000)/60000);
    const s = Math.floor((diff%60000)/1000);
    document.getElementById('next-prayer-name').textContent = next.ar;
    document.getElementById('next-prayer-time').textContent = formatTime(prayerTimes[next.key]);
    document.getElementById('next-prayer-countdown').textContent = `in ${h}h ${m}m ${s}s`;
  }
}

// ══════════════════════════════════════════════════
// AZAAN
// ══════════════════════════════════════════════════
function toggleAzaan() {
  if (azaanPlaying) { stopAzaan(); } else { playAzaan(); }
}

function playAzaan() {
  const audio = document.getElementById('azaan-audio');
  // Try primary source first, fall back to secondary
  audio.load();
  audio.currentTime = 0;
  const playPromise = audio.play();
  if (playPromise !== undefined) {
    playPromise.then(() => {
      azaanPlaying = true;
      const btn = document.getElementById('azaan-btn');
      btn.classList.add('playing');
      btn.innerHTML = '<i class="ti ti-volume-off" style="font-size:16px;"></i> Stop';
    }).catch(err => {
      console.log('Primary source failed, trying fallback:', err);
      // Try fallback CDN source directly
      audio.src = 'https://cdn.aladhan.com/audio/adhans/a1.mp3';
      audio.load();
      audio.play().then(() => {
        azaanPlaying = true;
        const btn = document.getElementById('azaan-btn');
        btn.classList.add('playing');
        btn.innerHTML = '<i class="ti ti-volume-off" style="font-size:16px;"></i> Stop';
      }).catch(e2 => {
        console.error('Azaan playback failed:', e2);
        const btn = document.getElementById('azaan-btn');
        btn.innerHTML = '<i class="ti ti-volume" style="font-size:16px;"></i> Azaan';
        alert('Audio blocked. Please tap the Azaan button again or check your volume.');
      });
    });
  }
  audio.onended = stopAzaan;
}

function stopAzaan() {
  const audio = document.getElementById('azaan-audio');
  audio.pause();
  audio.currentTime = 0;
  azaanPlaying = false;
  const btn = document.getElementById('azaan-btn');
  btn.classList.remove('playing');
  btn.innerHTML = '<i class="ti ti-volume" style="font-size:16px;"></i> Azaan';
}

function scheduleAzaan() {
  const prayers = PRAYERS.filter(p => !p.noAdhan && prayerTimes[p.key]);
  prayers.forEach(p => {
    const [h,m] = prayerTimes[p.key].split(':').map(Number);
    const now = new Date();
    const target = new Date(); target.setHours(h,m,0,0);
    const diff = target - now;
    if (diff > 0) {
      // Schedule azaan
      setTimeout(() => {
        playAzaan();
        if (notifGranted) {
          new Notification(`IA Companion — ${p.en}`, {
            body: `It is time for ${p.en} — ${formatTime(prayerTimes[p.key])}`,
            icon: 'data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><text y=".9em" font-size="90">🕌</text></svg>'
          });
        }
      }, diff);
      // Schedule day-before notification for key Islamic dates at 9am
      scheduleEventReminders();
    }
  });
}

function scheduleEventReminders() {
  // Notify at 9am for any events tomorrow
  const now = new Date();
  const nineAm = new Date(); nineAm.setHours(9,0,0,0);
  if (now < nineAm) {
    setTimeout(() => sendEventReminders(), nineAm - now);
  }
}

function sendEventReminders() {
  if (!notifGranted) return;
  // Check tomorrow's hijri date
  // We approximate: tomorrow's events in the current hijri month
  const todayDay = parseInt(hijriDate.day || 1);
  const tomorrowDay = todayDay + 1;
  const todayMonth = hijriDate.month?.number || 1;
  const tomorrowEvents = SHIA_EVENTS.filter(e => e.month === todayMonth && e.day === tomorrowDay);
  tomorrowEvents.forEach(ev => {
    new Notification(`Tomorrow — ${ev.en}`, {
      body: `${ev.ar}\n${ev.desc.substring(0,100)}...`,
    });
  });
}

const CAL_DAY_HEADERS = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];

async function renderCalendar() {
  // Get days in this hijri month
  document.getElementById('cal-title').textContent = `${HIJRI_MONTHS_AR[calHijriMonth-1]} ${calHijriYear}`;
  document.getElementById('cal-title-en').textContent = `${HIJRI_MONTHS[calHijriMonth-1]} ${calHijriYear} AH`;
  const grid = document.getElementById('cal-grid');
  grid.innerHTML = '';
  // Day headers
  CAL_DAY_HEADERS.forEach(d => {
    const el = document.createElement('div');
    el.className = 'cal-day-header'; el.textContent = d;
    grid.appendChild(el);
  });
  // Get first day of this hijri month
  try {
    const url = `https://api.aladhan.com/v1/hToG/1-${calHijriMonth}-${calHijriYear}`;
    const res = await fetch(url);
    const data = await res.json();
    if (data.code === 200) {
      const greg = data.data.gregorian;
      const firstGreg = new Date(`${greg.year}-${greg.month.number.toString().padStart(2,'0')}-${greg.day.padStart(2,'0')}`);
      const startDow = firstGreg.getDay(); // 0=Sun
      // Days in month — Hijri months are 29 or 30 days
      const daysInMonth = await getHijriMonthDays(calHijriMonth, calHijriYear);
      // Empty cells
      for (let i = 0; i < startDow; i++) {
        const el = document.createElement('div'); el.className = 'cal-day empty'; grid.appendChild(el);
      }
      const todayHijriDay = (calHijriMonth === (hijriDate.month?.number||0) && calHijriYear === parseInt(hijriDate.year||0)) ? parseInt(hijriDate.day||0) : -1;
      for (let d = 1; d <= daysInMonth; d++) {
        const events = SHIA_EVENTS.filter(e => e.month === calHijriMonth && e.day === d);
        const gregDate = new Date(firstGreg); gregDate.setDate(gregDate.getDate() + d - 1);
        const gregMonths = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
        const gregStr = `${gregDate.getDate()} ${gregMonths[gregDate.getMonth()]}`;
        const el = document.createElement('div');
        let cls = 'cal-day';
        if (d === todayHijriDay) cls += ' today';
        if (events.length > 0) {
          const types = events.map(e=>e.type);
          if (types.includes('mourning')) cls += ' mourning';
          else if (types.includes('celebration')) cls += ' celebration';
          else cls += ' significant';
        }
        el.className = cls;
        el.innerHTML = `<span class="cal-day-num">${d}</span><span class="cal-day-greg">${gregStr}</span>`;
        if (events.length > 0) {
          el.onclick = () => showEventPopup(events[0], d);
        }
        grid.appendChild(el);
      }
    }
  } catch(e) {
    grid.innerHTML = '<div style="color:var(--text-muted);padding:20px;text-align:center;grid-column:1/-1;">Calendar loading failed. Please check connection.</div>';
  }
}

async function getHijriMonthDays(month, year) {
  try {
    const url = `https://api.aladhan.com/v1/hToG/1-${month === 12 ? 1 : month+1}-${month === 12 ? year+1 : year}`;
    const res = await fetch(url);
    const data = await res.json();
    if (data.code === 200) {
      const g1 = await fetch(`https://api.aladhan.com/v1/hToG/1-${month}-${year}`);
      const d1 = await g1.json();
      const date1 = new Date(d1.data.gregorian.date.split('-').reverse().join('-'));
      const date2 = new Date(data.data.gregorian.date.split('-').reverse().join('-'));
      return Math.round((date2 - date1) / 86400000);
    }
  } catch(e) {}
  return 30; // fallback
}

function calPrev() {
  calHijriMonth--;
  if (calHijriMonth < 1) { calHijriMonth = 12; calHijriYear--; }
  renderCalendar();
}

function calNext() {
  calHijriMonth++;
  if (calHijriMonth > 12) { calHijriMonth = 1; calHijriYear++; }
  renderCalendar();
}

function showEventPopup(event, day) {
  document.getElementById('event-popup-title').textContent = event.ar;
  document.getElementById('event-popup-date').textContent = `${day} ${HIJRI_MONTHS[calHijriMonth-1]} ${calHijriYear} AH • ${event.en}`;
  document.getElementById('event-popup-desc').textContent = event.desc;
  document.getElementById('event-popup').classList.add('open');
  document.getElementById('overlay').classList.add('show');
}

function closePopup() {
  document.getElementById('event-popup').classList.remove('open');
  document.getElementById('overlay').classList.remove('show');
}

function renderDates() {
  const container = document.getElementById('dates-list');
  container.innerHTML = '';
  const todayHijriDay = parseInt(hijriDate.day || 0);
  const todayHijriMonth = hijriDate.month?.number || 0;

  // Group by month
  const months = [...new Set(SHIA_EVENTS.map(e=>e.month))].sort((a,b)=>a-b);
  months.forEach(m => {
    const events = SHIA_EVENTS.filter(e => e.month === m);
    const sec = document.createElement('div');
    sec.className = 'section-title';
    sec.textContent = `${HIJRI_MONTHS_AR[m-1]} — ${HIJRI_MONTHS[m-1]}`;
    container.appendChild(sec);
    events.sort((a,b)=>a.day-b.day).forEach(ev => {
      const card = document.createElement('div');
      const daysAway = calcDaysAway(ev.month, ev.day, todayHijriMonth, todayHijriDay);
      const isTomorrow = daysAway === 1;
      const isToday = daysAway === 0;
      const isUpcoming = daysAway > 0 && daysAway <= 7;
      card.className = `event-card ${ev.type}${isUpcoming?' upcoming':''}`;
      let badge = '';
      if (isToday) badge = `<span class="tomorrow-badge">TODAY</span>`;
      else if (isTomorrow) badge = `<span class="tomorrow-badge">TOMORROW</span>`;
      else if (isUpcoming) badge = `<span class="upcoming-badge">in ${daysAway}d</span>`;
      card.innerHTML = `
        <div class="event-dot ${ev.type}"></div>
        <div class="event-info">
          <div class="event-title-ar">${ev.ar}${badge}</div>
          <div class="event-title-en">${ev.en}</div>
        </div>
        <div class="event-date-badge">
          <div class="event-hijri">${ev.day} ${HIJRI_MONTHS_AR[ev.month-1]}</div>
          <div class="event-days-away">${daysAway === 0 ? 'Today' : daysAway > 0 ? `in ${daysAway}d` : ''}</div>
        </div>`;
      card.onclick = () => {
        document.getElementById('event-popup-title').textContent = ev.ar;
        document.getElementById('event-popup-date').textContent = `${ev.day} ${HIJRI_MONTHS[ev.month-1]} • ${ev.en}`;
        document.getElementById('event-popup-desc').textContent = ev.desc;
        document.getElementById('event-popup').classList.add('open');
        document.getElementById('overlay').classList.add('show');
      };
      container.appendChild(card);
    });
  });
}

function calcDaysAway(evMonth, evDay, todayMonth, todayDay) {
  // Simple estimate within same year
  const evMonthIdx = evMonth - 1;
  const todayMonthIdx = todayMonth - 1;
  const avgDays = 29.5;
  const evDayOfYear = evMonthIdx * avgDays + evDay;
  const todayDayOfYear = todayMonthIdx * avgDays + todayDay;
  let diff = Math.round(evDayOfYear - todayDayOfYear);
  if (diff < 0) diff += 354; // next hijri year
  return diff;
}

// ══════════════════════════════════════════════════
// PWA — MANIFEST + ICON + SERVICE WORKER
// ══════════════════════════════════════════════════
function generateIcon(size) {
  const canvas = document.createElement('canvas');
  canvas.width = size; canvas.height = size;
  const ctx = canvas.getContext('2d');
  // Background
  ctx.fillStyle = '#0a1628';
  ctx.fillRect(0, 0, size, size);
  // Outer circle border
  ctx.strokeStyle = '#c9a84c';
  ctx.lineWidth = size * 0.03;
  ctx.beginPath();
  ctx.arc(size/2, size/2, size*0.45, 0, Math.PI*2);
  ctx.stroke();
  // 8-pointed Islamic star
  ctx.fillStyle = '#c9a84c';
  ctx.save();
  ctx.translate(size/2, size/2);
  const r1 = size * 0.32, r2 = size * 0.14;
  const points = 8;
  ctx.beginPath();
  for (let i = 0; i < points * 2; i++) {
    const angle = (i * Math.PI / points) - Math.PI/2;
    const r = i % 2 === 0 ? r1 : r2;
    const x = Math.cos(angle) * r, y = Math.sin(angle) * r;
    i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
  }
  ctx.closePath();
  ctx.fill();
  // Centre dot
  ctx.fillStyle = '#0a1628';
  ctx.beginPath();
  ctx.arc(0, 0, size*0.07, 0, Math.PI*2);
  ctx.fill();
  ctx.fillStyle = '#e8c87a';
  ctx.beginPath();
  ctx.arc(0, 0, size*0.04, 0, Math.PI*2);
  ctx.fill();
  ctx.restore();
  // "IA" text
  ctx.fillStyle = '#e8c87a';
  ctx.font = `${size*0.13}px Inter, sans-serif`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('IA', size/2, size*0.82);
  return canvas.toDataURL('image/png');
}

function setupPWA() {
  const icon192 = generateIcon(192);
  const icon512 = generateIcon(512);
  const manifest = {
    name: 'IA Companion',
    short_name: 'IA Companion',
    description: 'Ithna Ashari Shia Islamic Companion — Prayer Times, Hijri Calendar & Key Dates (Sistani)',
    start_url: './',
    display: 'standalone',
    background_color: '#071a0e',
    theme_color: '#071a0e',
    orientation: 'portrait',
    icons: [
      { src: icon192, sizes: '192x192', type: 'image/png', purpose: 'any maskable' },
      { src: icon512, sizes: '512x512', type: 'image/png', purpose: 'any maskable' }
    ]
  };
  const blob = new Blob([JSON.stringify(manifest)], {type:'application/json'});
  const url = URL.createObjectURL(blob);
  document.getElementById('pwa-manifest').href = url;
  // Favicon
  const link = document.createElement('link');
  link.rel = 'icon'; link.type = 'image/png'; link.href = icon192;
  document.head.appendChild(link);
  // Apple touch icon
  const apple = document.createElement('link');
  apple.rel = 'apple-touch-icon'; apple.href = icon192;
  document.head.appendChild(apple);
}

function registerServiceWorker() {
  if ('serviceWorker' in navigator) {
    const swCode = `
const CACHE = 'ia-companion-v1';
const ASSETS = ['./', './index.html'];
self.addEventListener('install', e => {
  e.waitUntil(caches.open(CACHE).then(c => c.addAll(ASSETS)));
  self.skipWaiting();
});
self.addEventListener('activate', e => {
  e.waitUntil(caches.keys().then(keys =>
    Promise.all(keys.filter(k => k !== CACHE).map(k => caches.delete(k)))
  ));
  self.clients.claim();
});
self.addEventListener('fetch', e => {
  if (e.request.url.includes('api.aladhan.com') || e.request.url.includes('shiasource.com')) {
    e.respondWith(fetch(e.request).catch(() => caches.match(e.request)));
    return;
  }
  e.respondWith(
    caches.match(e.request).then(r => r || fetch(e.request).then(res => {
      const clone = res.clone();
      caches.open(CACHE).then(c => c.put(e.request, clone));
      return res;
    }))
  );
});
`;
    const blob = new Blob([swCode], {type:'application/javascript'});
    const url = URL.createObjectURL(blob);
    navigator.serviceWorker.register(url, {scope: './'})
      .catch(e => console.log('SW registration failed:', e));
  }
}
